name: Deploy to GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: carbon-soc/package-lock.json

      - name: Install dependencies
        working-directory: carbon-soc
        run: npm ci

      - name: Build Next.js static export
        working-directory: carbon-soc
        run: npm run build

      - name: Add .nojekyll
        run: touch carbon-soc/out/.nojekyll

      - name: Copy Shannon Sentinel pages
        run: cp dashboard.html investigate.html triage.html reports.html carbon-soc/out/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: carbon-soc/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
